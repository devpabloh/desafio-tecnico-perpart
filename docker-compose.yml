services: 
  db_postgresql:
    image: postgres:15-alpine
    container_name: govpe_db_postgresql
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: govpe_api
    restart: always
    ports:
      - "3334:3333"
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db_postgresql:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db_postgresql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: govpe_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: