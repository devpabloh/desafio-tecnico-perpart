services: 
  db_postgresql:
    image: postgres:15-alpine
    container_name: govpe_db_postgresql
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
  
  backend:
    build: ./backend
    container_name: govpe_api
    restart: always
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db_postgresql:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db_postgresql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: govpe_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: